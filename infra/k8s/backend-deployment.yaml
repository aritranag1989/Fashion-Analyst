apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fashion-analyst
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: fashion-analyst-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: fashion-analyst-env
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fashion-analyst
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
