apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fashion-analyst
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: fashion-analyst-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://backend:8000/api/v1"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fashion-analyst
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
