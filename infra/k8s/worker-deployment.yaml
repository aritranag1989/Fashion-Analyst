apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: fashion-analyst
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: fashion-analyst-worker:latest
          envFrom:
            - secretRef:
                name: fashion-analyst-env
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: fashion-analyst
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      containers:
        - name: beat
          image: fashion-analyst-worker:latest
          command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=INFO"]
          envFrom:
            - secretRef:
                name: fashion-analyst-env
